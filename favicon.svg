<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Dark Grey Rounded Background -->
    <rect width="100" height="100" rx="25" fill="#1a1a1a" />
    
    <!-- Connecting Line -->
    <line x1="50" y1="26" x2="50" y2="74" stroke="#e8e7e7" stroke-width="4" />
    
    <!-- Parent Circle -->
    <circle cx="50" cy="26" r="12" fill="#e8e7e7" />
    
    <!-- Adult Circle -->
    <circle cx="50" cy="50" r="12" fill="#e8e7e7" />
    
    <!-- Child Circle (Orange Highlight) -->
    <circle cx="50" cy="74" r="12" fill="#f28d35" />
</svg>