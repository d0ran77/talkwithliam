        @media (min-width: 768px) {
            .ego-magnetic-wrapper {

                height: 160px;
            }
        }

        /* The Visible Glass Circle */
        .ego-glass {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            
            /* Glassmorphism Effect */

            border: 1px solid rgba(255, 255, 255, 0.1);

        .ego-magnetic-wrapper:hover .ego-glass {

        .adult-node .ego-glass {

        }

        #immersive-layer.active {

        #immersive-layer::-webkit-scrollbar-thumb, .detail-scroll::-webkit-scrollbar-thumb { background: rgba(242, 141, 53, 0.2); }

    <script>
        let currentView = 'structural';

        const structuralData = {
            parent: {
                label: 'P2 / Introjected Caregivers',
                nodes: [
                    { 
                        id: 'p3', code: 'P₃', name: 'The Parent\'s Parent', 
                        desc: 'The transgenerational archive replaying the caregiver\'s Parent state, tracing back to the grandmother.',
                        thirdTitle: 'Transgenerational Archive',
                        thirdBody: 'P₃ stores directives passed down from grandparents and authority figures. Berne noted the "script scene" began generations ago, transmitted chemically and psychologically.',
                        relational: 'To make a lady, you start with the grandmother. P₃ represents the grandmother\'s profound influence. A grandmother carries the cellular precursor (the egg) of her grandchild within her own fetal womb.',
                        example: 'Rigidly enforcing an etiquette standard ("elbows off the table") as a direct replay of the maternal grandmother\'s authoritative voice.',
                        actionLabel: 'Trace to Biological Precursor (P₀)',
                        actionTarget: 'noughts'
                    },
                    { 
                        id: 'a3', code: 'A₃', name: 'The Parent\'s Adult', 
                        desc: 'Copied statements about reality from parental figures, registered by the infant as absolute facts.',
                        thirdTitle: 'Copied Logic',
                        thirdBody: 'A₃ contains claims about reality heard and subsequently copied. These internalised statements are often treated as absolute facts without the capacity for objective testing.',
                        relational: 'These introjects form the basis of a person\'s initial worldview. They are the "taught" version of facts registered before motility and independent data-gathering (A₂).',
                        example: 'Confidently passing on superstitions as objective facts because they were stated as such by an authority figure.'
                    },
                    { 
                        id: 'c3', code: 'C₃', name: 'The Parent\'s Child', 
                        desc: 'The internalised emotional reactions and archaic distress of the parent replayed in the here-and-now.',
                        thirdTitle: 'Emotional Echoes',
                        thirdBody: 'Records the emotional reactions, frustrations, and childlike behaviours of caregivers. It contains the parent\'s own archaic distress and unresolved needs.',
                        relational: 'In daily life, we may grumble with the specific affect of our parent. Even if it looks "bossy," it is a direct recording of the father\'s or mother\'s internalised Child state.',
                        example: 'A manager snapping at staff with the exact tone his father used when frustrated, replaying an archaic father-child dynamic.'
                    }
                ]
            },
            adult: {
                label: 'A2 / Reality Testing',
                nodes: [
                    { 
                        id: 'a2', code: 'Now', name: 'The Adult', 
                        desc: 'Autonomous explorer separating reality from taught or felt concepts through motility and independent exploration.',
                        thirdTitle: 'The Motile Self',
                        thirdBody: 'Emerging at ten months as the child gains motility. It gathers and processes data to separate current reality from external "taught concepts" and internal "felt concepts".',
                        relational: 'The Adult is the neo-psychic state—the only state focused on the intersubjective field of the present moment, free from historical tape-recordings.',
                        example: 'Functions as the anchor for structural diagnosis, assessing whether a reaction is a historical playback or a response to current data.'
                    }
                ]
            },
            child: {
                label: 'C2 / Relics of Childhood',
                nodes: [
                    { 
                        id: 'p1', code: 'P₁', name: 'The Magical Parent', 
                        desc: 'Early messages coloured by magical thinking and frightening fantasies. Acts as an internal regulator.',
                        special: 'electrode',
                        thirdTitle: 'Spooky / Internal Object',
                        thirdBody: 'P₁ holds early directives coloured by the infant\'s magical thinking. Believing "If I do not finish my plate, Mummy will never come back" remains as a script constraint.',
                        relational: 'Known as the "Electrode" or "Pig Parent," it holds the reins of spontaneous impulses to keep the person safe from perceived parental anger through shame and fear.',
                        example: 'Internal pressure enforcing "Not OK" feelings based on primitive magical distortions of caregiver messages.'
                    },
                    { 
                        id: 'a1', code: 'A₁', name: 'The Little Professor', 
                        desc: 'Adult within the Child. The "Scientist in the Crib" using intuition to solve interpersonal problems.',
                        thirdTitle: 'Spunky / Intersubjective Self',
                        thirdBody: 'The infant\'s capacity for problem-solving. A₁ builds hypotheses and tests them—like a toddler watching a parent\'s reaction when reaching for a socket.',
                        relational: 'The center of human intuition. A₁ is split into A₁+ (the adapted false self) and A₁- (the shame-filled self carrying the sense of "falling from grace").',
                        example: 'An infant intuitively "reading" a caregiver\'s mind to sense if they are angry or truthfully present before language exists.'
                    },
                    { 
                        id: 'c1', code: 'C₁', name: 'The Somatic Child', 
                        desc: 'Core biological self containing physiological survival responses and intrauterine patterning.',
                        thirdTitle: 'Sleepy / The Core Self',
                        thirdBody: 'Present from birth. It holds the "emergent self" (C₀). A baby is already nine months old at birth, having undergone significant intrauterine patterning.',
                        relational: 'Houses earliest bodily-affective states and yearnings for mirroring. Raw somatic distress here triggers coping strategies in the higher levels.',
                        example: 'A visceral reaction to a lack of attunement. This raw distress is what forces A₁ to develop survival strategies.',
                        actionLabel: 'Drill to Foundation (Level 0) →',
                        actionTarget: 'noughts'
                    }
                ]
            },
            noughts: {
                label: 'Level 0 / The Foundations',
                nodes: [
                    { 
                        id: 'p0', code: 'P₀', name: 'Earliest Other', 
                        desc: 'Somatic sense of being contacted by the environment or mother. The biological legacy of the grandmother.',
                        thirdTitle: 'The Pre-Verbal Other',
                        thirdBody: 'P₀ represents the earliest sensed contact. It overlaps with C₀. Healthy attunement builds the foundation of a cohesive self.',
                        relational: 'Transgenerational biology: a grandmother carries the egg of her grandchild. Psychological destiny is tied to the ancestral environment.',
                        example: 'Pre-cognitive memories of being held, soothed, or neglected as an infant.'
                    },
                    { 
                        id: 'a0', code: 'A₀', name: 'Emergent Adult', 
                        desc: 'Primitive sensory data processing and conversion of stimuli into survival action.',
                        thirdTitle: 'The Sensory Processor',
                        thirdBody: 'A₀ represents the earliest capacity to process data, such as a newborn turning its head toward the smell of milk.',
                        relational: 'The very first "Adult" function: translating somatic needs into environmental interactions.',
                        example: 'The pre-verbal "scientist" testing the temperature of the world.'
                    },
                    { 
                        id: 'c0', code: 'C₀', name: 'Emergent Self', 
                        desc: 'The somatic core self. The earliest phase of life where there is no clear boundary between "me" and "you".',
                        thirdTitle: 'The Somatic Womb',
                        thirdBody: 'The emergent self houses bodily-affective states. It is built through intrauterine patterning and the mother\'s biological/emotional state.',
                        relational: 'If the infant experiences good-enough attunement, C₀ forms a healthy, cohesive core. Neglect leads to undigested trauma.',
                        example: 'The nine-month-old "pre-birth" state of being.'
                    }
                ]
            }
        };

        const functionalData = {
            parent: { 
                label: 'Functional Parent Modes', 
                nodes: [
                    { 
                        id: 'cp', code: 'CP', name: 'Controlling Parent', 
                        desc: 'Focuses on boundary-setting and rules. Can manifest as constructive advice (positive) or punitive bossiness (negative).',
                        thirdTitle: 'The Rule Maker',
                        thirdBody: 'The Controlling (or Structuring) Parent encompasses behaviors related to guiding and enforcing rules. In its positive "Good-enough" form, it provides safe, constructive boundaries. In its negative "Inadequate" form, it becomes excessively bossy, critical, or punitive.',
                        relational: 'Application: The X-Ray View (Intrapsychic Dialogue). The functional model maps out a person\'s internal conversations. Identifying an Inadequate Parent mode allows the individual to consciously replace the critical internal voice with a supportive, Good-enough Parent mode.',
                        example: 'Firmly but calmly setting a boundary (Positive) vs. using a condescending tone and pointing a finger (Negative).'
                    }, 
                    { 
                        id: 'np', code: 'NP', name: 'Nurturing Parent', 
                        desc: 'Focuses on care and protection. Can manifest as genuine comforting (positive) or patronizing smothering (negative).',
                        thirdTitle: 'The Caregiver',
                        thirdBody: 'The Nurturing Parent provides support. Positively, it cares for someone when genuinely needed. Negatively, it can be smothering, patronizing, or doing things for others that they do not need, undermining their autonomy.',
                        relational: 'Application: The Microscopic View (Interpersonal Transactions). By analyzing moment-to-moment transactions, individuals can see exactly which functional modes they are using, allowing them to experiment with alternative responses to break out of entrenched or disastrous communication loops.',
                        example: 'Offering a warm hug when requested (Positive) vs. taking over a task someone is completely capable of doing themselves (Negative).'
                    }
                ]
            },
            adult: { 
                label: 'Functional Adult Mode', 
                nodes: [
                    { 
                        id: 'a_func', code: 'A', name: 'Adult Mode', 
                        desc: 'Objective, rational, data-processing, and problem-solving behaviors of the here-and-now.',
                        thirdTitle: 'The Processor',
                        thirdBody: 'Often left undivided, this mode represents behavior that is an objective, problem-solving response to the present moment. It utilizes all of a person\'s grown-up resources, frequently likened to a "computer".',
                        relational: 'Application: The Microscopic View. Highly effective for couples and relationship therapy. It allows clients to break out of tedious communication loops by consciously choosing a neutral, fact-based response.',
                        example: 'Maintaining an even, steady tone of voice and open posture while asking clarifying questions during a conflict.'
                    }
                ]
            },
            child: { 
                label: 'Functional Child Modes', 
                nodes: [
                    { 
                        id: 'ac', code: 'AC', name: 'Adapted Child', 
                        desc: 'Behaviors influenced by parental figures, ranging from polite compliance to rebellion and withdrawal.',
                        thirdTitle: 'The Responder',
                        thirdBody: 'The Adapted Child manifests behaviors influenced by parental figures. This includes not only polite compliance and obedience (positive), but also rebellion, defiance, sulking, and withdrawal (negative).',
                        relational: 'Application: The Macroscopic View (Egograms). Developed by Jack Dusay, an Egogram visually represents the relative amount of time and psychic energy a person spends in each of the five functional modes.',
                        example: 'Waiting your turn to speak (Positive) vs. crossing arms, pouting, or aggressively defying a simple instruction (Negative).'
                    }, 
                    { 
                        id: 'nc', code: 'NC', name: 'Natural Child', 
                        desc: 'The source of spontaneous expression, creativity, and playfulness. Can be positive or negatively egocentric.',
                        thirdTitle: 'The Spontaneous Self',
                        thirdBody: 'The Natural (or Free) Child is the source of autonomous, spontaneous expression, creativity, and energetic playfulness. In its negative form, it can also manifest as immature, ruthless, or self-indulgent egocentrism.',
                        relational: 'Application: Energy Shifts (Constancy Hypothesis). To decrease a dysfunctional behavior, you intentionally invest energy into increasing a positive mode (like the Free Child). As the new mode grows, energy automatically drains from the unwanted one.',
                        example: 'Laughing unselfconsciously at a joke (Positive) vs. reckless behavior with no regard for others\' boundaries or safety (Negative).'
                    }
                ]
            }
        };

        function setView(view) {
            currentView = view;
            document.getElementById('btn-structural').classList.toggle('active', view === 'structural');
            document.getElementById('btn-functional').classList.toggle('active', view === 'functional');
            document.getElementById('view-title').innerText = view === 'structural' ? 'Structural Analysis' : 'Functional Behavioural Model';
            renderMainStack();
        }

        function renderMainStack() {
            const stack = document.getElementById('main-ego-stack');
            const labels = currentView === 'structural' ? { p: 'Introjected', a: 'Logical', c: 'Archaic' } : { p: 'Parental', a: 'Rational', c: 'Authentic' };
            stack.innerHTML = `
                <article class="ego-magnetic-wrapper group" onclick="openImmersive('parent')">
                    <div class="ego-glass breathe-1">
                        <span class="meta-label text-[8px] opacity-60 group-hover:opacity-100 mb-1 text-center">${labels.p}</span>
                        <span class="text-4xl md:text-5xl text-white">P<sub class="text-xl md:text-2xl">2</sub></span>
                    </div>
                </article>
                <div class="structural-line my-3 md:my-5"></div>
                <article class="ego-magnetic-wrapper adult-node group" onclick="openImmersive('adult')">
                    <div class="ego-glass breathe-2">
                        <span class="meta-label text-[8px] opacity-60 group-hover:opacity-100 mb-1 text-center">${labels.a}</span>
                        <span class="text-4xl md:text-5xl text-white">A<sub class="text-xl md:text-2xl">2</sub></span>
                    </div>
                </article>
                <div class="structural-line my-3 md:my-5"></div>
                <article class="ego-magnetic-wrapper group" onclick="openImmersive('child')">
                    <div class="ego-glass breathe-3">
                        <span class="meta-label text-[8px] opacity-60 group-hover:opacity-100 mb-1 text-center">${labels.c}</span>
                        <span class="text-4xl md:text-5xl text-white">C<sub class="text-xl md:text-2xl">2</sub></span>
                    </div>
                </article>
            `;

            // Initialize Magnetic Interaction
            const magnetics = document.querySelectorAll('.ego-magnetic-wrapper');
            magnetics.forEach(btn => {
                btn.addEventListener('mousemove', (e) => {
                    const rect = btn.getBoundingClientRect();
                    const x = e.clientX - rect.left - (rect.width / 2);
                    const y = e.clientY - rect.top - (rect.height / 2);
                    btn.style.transform = `translate(${x * 0.15}px, ${y * 0.15}px)`;
                });
                btn.addEventListener('mouseleave', () => {
                    btn.style.transform = `translate(0px, 0px)`;
                });
            });
        }

        function openImmersive(type) {
            const data = currentView === 'structural' ? (structuralData[type] || structuralData.noughts) : functionalData[type];
            document.getElementById('body-root').classList.add('panel-active');
            document.getElementById('immersive-layer').classList.add('active');

            document.getElementById('immersive-header').innerHTML = `
                <div class="meta-label text-monolith/80 mb-2 uppercase tracking-[0.5em] text-left">${data.label}</div>
                <h2 id="immersive-header-title" class="serif-display text-3xl md:text-4xl text-white text-left mb-6">${currentView === 'structural' ? 'Structural Analysis.' : 'Functional Modes.'}</h2>
            `;

            let html = `<div class="flex flex-col w-full pb-12 pt-6">`;
            data.nodes.forEach((node, index) => {
                const delayClass = `breathe-${(index % 3) + 1}`;
                const hasLine = index < data.nodes.length - 1;
                
                html += `
                    <div class="flex w-full group cursor-pointer" onclick="event.stopPropagation(); showDetail('${type}', '${index}')">
                        
                        <!-- Left Column: Circle & Line -->
                        <div class="flex flex-col items-center mr-6 md:mr-12 shrink-0">
                            <div class="inner-node text-xl md:text-2xl text-white transition-all ${node.special || ''} ${delayClass}">
                                ${node.code}
                            </div>
                            ${hasLine ? `<div class="w-[1px] flex-grow bg-[rgba(232,231,231,0.25)] my-2 md:my-4 min-h-[20px]"></div>` : ''}
                        </div>
                        
                        <!-- Right Column: Text -->
                        <div class="flex flex-col items-start pr-4 pt-2 md:pt-4 ${hasLine ? 'pb-8 md:pb-12' : ''}">
                            <div class="meta-label text-[9px] md:text-[11px] text-white/60 mb-2 tracking-[0.3em] group-hover:text-monolith transition-colors">${node.name}</div>
                            <p class="text-ash/80 text-[13px] md:text-[15px] leading-relaxed font-light max-w-[550px]">
                                ${node.desc}
                            </p>
                        </div>

                    </div>
                `;
            });
            html += `</div>`;

            document.getElementById('immersive-content').innerHTML = html;
            document.getElementById('immersive-layer').scrollTop = 0;
        }

        function showDetail(type, index) {
            const isStructural = currentView === 'structural';
            const dataSet = isStructural ? (structuralData[type] || structuralData.noughts) : functionalData[type];
            const node = dataSet.nodes[index];
            
            document.getElementById('detail-meta').innerText = `${isStructural ? 'Structural' : 'Functional'} Analysis / ${node.code}`;
            document.getElementById('detail-title').innerText = node.thirdTitle;
            document.getElementById('detail-body').innerText = node.thirdBody;
            document.getElementById('detail-relational').innerText = node.relational;
            document.getElementById('detail-example').innerText = node.example;

            document.getElementById('heading-relational').innerText = isStructural ? 'Relational & Biological Perspective' : 'Clinical Application';
            document.getElementById('heading-example').innerText = isStructural ? 'Phenomenological Reality' : 'Observable Behavior';

            const actionContainer = document.getElementById('detail-action-container');
            if (node.actionTarget && isStructural) {
                actionContainer.classList.remove('hidden');
                document.getElementById('detail-action-btn').innerText = node.actionLabel;
                document.getElementById('detail-action-btn').onclick = () => {
                    closeDetail();
                    openImmersive(node.actionTarget);
                };
            } else {
                actionContainer.classList.add('hidden');
            }

            document.getElementById('detail-overlay').classList.add('active');
            document.getElementById('body-root').classList.add('detail-active');
        }

        function closeDetail() {
            document.getElementById('detail-overlay').classList.remove('active');
            document.getElementById('body-root').classList.remove('detail-active');
        }

        function closeImmersive() {
            document.getElementById('body-root').classList.remove('panel-active');
            document.getElementById('immersive-layer').classList.remove('active');
        }

        window.onload = renderMainStack;
        document.addEventListener('keydown', (e) => { 
            if (e.key === 'Escape') {
                if (document.getElementById('detail-overlay').classList.contains('active')) closeDetail();
                else closeImmersive();
            }
        });
    </script>
</body>
</html>
